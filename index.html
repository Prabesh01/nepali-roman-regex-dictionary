<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali Roman RegEx Search</title>
    <meta property="og:title" content="Nepali Roman RegEx Dictionary Word Search"/>
    <meta property="og:description" content="Find nepali words with patterns. 4 letter nepali words. Nepali words starting with a. Nepali name suggestions for newly born children boy girl."/>
    <meta property="og:site_name" content="Nepali Roman RegEx Dictionary"/>

    <link rel="icon" href="/favicon.ico"/>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #333; }

        .input-wrapper { display: flex; align-items: center; font-size: 1.5rem; font-family: monospace; margin-bottom: 0.5rem; }
        input[type="text"] { font-size: 1.5rem; padding: 0.5rem; flex-grow: 1; margin: 0 0.5rem; font-family: monospace; border: 1px solid #ccc; border-radius: 4px; }

        .error { color: red; font-size: 0.9rem; margin-top: 0; margin-bottom: 1rem; display: block; height: 1.2em; }

        button { font-size: 1rem; padding: 0.5rem 1rem; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }

        /* Options Panel */
        details.options-panel { margin-bottom: 1.5rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.5rem 1rem; }
        summary { font-weight: 600; cursor: pointer; color: #475569; outline: none; user-select: none; }
        .options-content { margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem; font-size: 0.95rem; }
        .script-toggles, .filters { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .filters { padding-top: 0.5rem; border-top: 1px solid #e2e8f0; }

        .examples { background: #f8fafc; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #e2e8f0; }
        .examples h3 { margin-top: 0; font-size: 1.1rem; color: #475569; }
        .examples ul { columns: 2; list-style: none; padding: 0; margin: 0; }
        .examples li { margin-bottom: 0.5rem; }
        .examples a { color: #2563eb; text-decoration: none; cursor: pointer; }
        .examples a:hover { text-decoration: underline; }

        /* Clean Results Grid */
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; list-style: none; padding: 0; }
        .results li { background: #f3f4f6; border-radius: 4px; transition: background 0.2s; }
        .results li:hover { background: #e5e7eb; }
        .results a { display: block; padding: 0.5rem; text-align: center; color: inherit; text-decoration: none; font-size: 1.1rem; }
        .limit-message { background: none !important; text-align: left !important; color: #666; font-size: 0.9rem; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <h1 style="cursor:pointer" onclick="window.location='/'">Nepali Roman RegEx Dictionary</h1>
    <div id="subheader" style="margin-bottom: 1.5rem;">
        <a href="https://www.regexdictionary.com/" target="_blank">English RegEx Dictionary</a> |
        <a href="https://sabdasakha.com/" target="_blank">Nepali Dictionary</a>
    </div>

    <div class="input-wrapper">
        <span>/</span>
        <input type="text" id="regex-input" placeholder="Loading dictionary, please wait..." disabled>
        <span>/i</span><br>
    </div>
    <button id="copy-btn" style="margin-left:20px; display: none; margin-bottom: 1rem;">Copy URL</button>

    <span id="error-message" class="error"></span>

    <details class="options-panel">
        <summary>Search Options</summary>
        <div class="options-content">
            <div class="script-toggles">
                <strong>Search mode:</strong>
                <label><input type="radio" name="script-mode" value="roman" checked> Roman (Nepali)</label>
                <label><input type="radio" name="script-mode" value="nepali"> Devanagari (नेपाली)</label>
            </div>

            <div id="version-filters" class="filters">
                <strong style="flex-basis: 100%; margin-bottom: 0.25rem;">Roman Variant (फेरी छ):</strong>
                <label><input type="checkbox" class="version-tier" value="v1"> V1 (feree xa)</label>
                <label><input type="checkbox" class="version-tier" value="v2"> V2 (pheree chha)</label>
                <label><input type="checkbox" class="version-tier" value="v3" checked> V3 (feri xa)</label>
                <label><input type="checkbox" class="version-tier" value="v4" checked> V4 (pheri chha)</label>
            </div>
        </div>
    </details>

    <ul id="results" class="results"></ul>

    <div class="examples">
        <h3>Examples</h3>
        <ul id="example-list"></ul>
    </div>

    Made by <a href="https://prax.to" target="_blank">Prabesh Sapkota</a>. <a href="https://github.com/Prabesh01/nepali-roman-regex-dictionary" target="_blank">@Prabesh01</a>

    <script>
        let dictionary = [];
        
        // --- Dynamic Examples Configuration ---
        const examplesDict = {
            'v4=^ni': "Words starting with 'ni'",
            'v3=man$': "Words ending with 'man'",
            'v4=^.{5}$': "Exactly 5 letters",
            'v0=^त.+त$': "Words that start and end with त",
            'v0=(.)\\1': "Double letters",
            'v0=^ज्ञ': "Words starting with 'ज्ञ'"
        };
        const defaultHeading = "Nepali Roman RegEx Dictionary";
        const defaultSubHeading = '<a href="https://www.regexdictionary.com/" target="_blank">English RegEx Dictionary</a> | <a href="https://sabdasakha.com/" target="_blank">Nepali Dictionary</a>'
        const mainHeading = document.querySelector('h1');
        const subHeading = document.getElementById('subheader');
        
        const input = document.getElementById('regex-input');
        const resultsList = document.getElementById('results');
        const errorSpan = document.getElementById('error-message');
        const copyBtn = document.getElementById('copy-btn');
        const checkboxes = document.querySelectorAll('.version-tier');
        const scriptRadios = document.querySelectorAll('input[name="script-mode"]');
        const versionFilters = document.getElementById('version-filters');
        const exampleList = document.getElementById('example-list');

        // Dynamically build example list links
        exampleList.innerHTML = Object.entries(examplesDict)
            .map(([key, description]) => `<li><a data-key="${key}">${description}</a></li>`)
            .join('');

        async function loadDictionary() {
            try {
                const response = await fetch('/words.json');
                dictionary = await response.json();
                input.placeholder = "Enter RegEx...";
                input.disabled = false;
                input.focus();

                // Process any URL parameters loaded initially
                initializeFromUrl();
            } catch (err) {
                errorSpan.textContent = "Failed to initialize dictionary database.";
            }
        }

        // Toggle UI based on Radio state
        function updateUIState() {
            const mode = document.querySelector('input[name="script-mode"]:checked').value;
            versionFilters.style.display = mode === 'roman' ? 'flex' : 'none';
        }

        // Handle URL history state cleanly
        function syncURL(pattern, mode, activeVersions) {
            const url = new URL(window.location);

            // Clear old params
            ['v0', 'v1', 'v2', 'v3', 'v4', 'r'].forEach(p => url.searchParams.delete(p));

            if (pattern) {
                if (mode === 'nepali') {
                    url.searchParams.set('v0', pattern);
                } else {
                    activeVersions.forEach(v => url.searchParams.set(v, pattern));
                }
                window.history.replaceState({}, '', url);
                copyBtn.style.display = 'block';
            } else {
                window.history.replaceState({}, '', url);
                copyBtn.style.display = 'none';
            }
        }

        function applyRegex(pattern) {
            input.value = pattern;
            errorSpan.textContent = "";

            const mode = document.querySelector('input[name="script-mode"]:checked').value;
            const activeVersions = Array.from(checkboxes).filter(chk => chk.checked).map(chk => chk.value);

            // Dynamic Heading Logic
            let matchedDescription = null;
            if (pattern) {
                if (mode === 'nepali') {
                    const lookupKey = `v0=${pattern}`;
                    if (examplesDict[lookupKey]) matchedDescription = examplesDict[lookupKey];
                } else {
                    for (const v of activeVersions) {
                        const lookupKey = `${v}=${pattern}`;
                        if (examplesDict[lookupKey]) {
                            matchedDescription = examplesDict[lookupKey];
                            break;
                        }
                    }
                }
            }
            if (matchedDescription){
                mainHeading.textContent = matchedDescription;
                mainHeading.onclick = null;
                subHeading.innerHTML = '<a href="/">Nepali Roman RegEx Dictionary</a>';
            }else{
                subHeading.innerHTML = defaultSubHeading;
                mainHeading.textContent = defaultHeading;
                mainHeading.onclick = () => { window.location = '/'; }
            }

            syncURL(pattern, mode, activeVersions);

            if (!pattern || dictionary.length === 0) {
                resultsList.innerHTML = "";
                return;
            }

            try {
                const regex = new RegExp(pattern, 'i');

                // Using Map instead of Set/Array.find makes deduplication INSTANT (O(1) lookups)
                const uniqueMatchesMap = new Map();

                dictionary.forEach(entry => {
                    if (mode === 'nepali') {
                        if (regex.test(entry.nepali)) {
                            if (!uniqueMatchesMap.has(entry.nepali)) {
                                uniqueMatchesMap.set(entry.nepali, entry.nepali);
                            }
                        }
                    } else {
                        // Roman Mode
                        if (activeVersions.length === 0) return;
                        activeVersions.forEach(versionKey => {
                            const wordVariant = entry[versionKey] || entry['standard'];
                            if (wordVariant && regex.test(wordVariant.trim())) {
                                const cleanWord = wordVariant.trim();
                                if (!uniqueMatchesMap.has(cleanWord)) {
                                    uniqueMatchesMap.set(cleanWord, entry.nepali);
                                }
                            }
                        });
                    }
                });

                // Convert map to array for rendering
                const uniqueMatches = Array.from(uniqueMatchesMap, ([displayText, sabdasakhaWord]) => ({ displayText, sabdasakhaWord }));

                const displayLimit = 1000;
                let resultsHTML = uniqueMatches
                    .slice(0, displayLimit)
                    .map(match => {
                        const dictUrl = `https://sabdasakha.com/?q=${encodeURIComponent(match.sabdasakhaWord)}`;
                        return `<li><a href="${dictUrl}" target="_blank" rel="noopener noreferrer">${match.displayText}</a></li>`;
                    })
                    .join('');

                if (uniqueMatches.length > displayLimit) {
                    resultsHTML += `<li class="limit-message"><em>...and ${uniqueMatches.length - displayLimit} more results</em></li>`;
                }

                resultsList.innerHTML = resultsHTML;

            } catch (err) {
                errorSpan.textContent = "Invalid RegEx syntax...";
                resultsList.innerHTML = "";
            }
        }

        function initializeFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            let initPattern = "";

            // If Nepali parameter is present
            if (urlParams.has('v0')) {
                document.querySelector('input[name="script-mode"][value="nepali"]').checked = true;
                initPattern = urlParams.get('v0');
            } else {
                // Check for Roman version parameters
                const checkedVars = [];
                ['v1', 'v2', 'v3', 'v4'].forEach(v => {
                    if (urlParams.has(v)) {
                        checkedVars.push(v);
                        initPattern = urlParams.get(v);
                    }
                });

                if (checkedVars.length > 0) {
                    document.querySelector('input[name="script-mode"][value="roman"]').checked = true;
                    checkboxes.forEach(chk => chk.checked = checkedVars.includes(chk.value));
                }
            }

            updateUIState();
            if (initPattern) applyRegex(initPattern);
        }

        // Event Listeners
        scriptRadios.forEach(r => r.addEventListener('change', () => {
            updateUIState();
            applyRegex(input.value.trim());
        }));

        checkboxes.forEach(chk => {
            chk.addEventListener('change', (e) => {
                const checkedCount = Array.from(checkboxes).filter(c => c.checked).length;
                if (checkedCount === 0) {
                    e.target.checked = true; // prevent unchecking the last box
                    return;
                }
                applyRegex(input.value.trim());
            });
        });

        input.addEventListener('input', (e) => {
            applyRegex(e.target.value.trim());
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href)
                .then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => copyBtn.textContent = originalText, 2000);
                });
        });

        // Dynamic Example link handling
        document.querySelectorAll('#example-list a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const key = link.getAttribute('data-key');
                const eqIndex = key.indexOf('=');
                const param = key.substring(0, eqIndex);
                const pattern = key.substring(eqIndex + 1);

                if (param === 'v0') {
                    document.querySelector('input[name="script-mode"][value="nepali"]').checked = true;
                } else {
                    document.querySelector('input[name="script-mode"][value="roman"]').checked = true;
                    checkboxes.forEach(chk => chk.checked = (chk.value === param));
                }

                updateUIState();
                applyRegex(pattern);
            });
        });

        // Initialize script logic
        updateUIState();
        loadDictionary();
    </script>
</body>
</html>
